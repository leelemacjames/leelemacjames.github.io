<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IB Computer Science · Swipe Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0d10;
  --surface: #13141a;
  --surface2: #0f1016;
  --border: #1e2028;
  --border2: #2a2f3b;
  --text: #d4d0c8;
  --muted: #6b6860;
  --gold: #c8a96e;
  --hl-red: #c0392b;
  --blue: #7ec8e3;
  --green: #9bd29b;
  --amber: #d8b06a;
  --white: #f0ede6;
  --purple: #b08fd4;
  --face0: #c8a96e;
  --face1: #7ec8e3;
  --face2: #9bd29b;
  --face3: #b08fd4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  overflow-x: hidden;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at top, #151924 0%, var(--bg) 55%);
}

/* ── Header ── */
.header {
  text-align: center;
  padding: 20px 20px 8px;
  width: 100%;
}
.header h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  color: var(--blue);
  letter-spacing: 0.03em;
}
.header .sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px 20px;
  width: 100%;
  max-width: 640px;
}
.controls button, .controls select, .controls input {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 7px 14px;
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  outline: none;
}
.controls button:hover { border-color: var(--blue); }
.controls button.active { background: var(--blue); color: var(--bg); border-color: var(--blue); font-weight: 600; }
.controls button.hl-active { background: var(--hl-red); color: #fff; border-color: var(--hl-red); }
.controls input { width: 160px; }
.controls input::placeholder { color: var(--muted); }

/* ── Topic filter row ── */
.topic-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 20px 8px;
  width: 100%;
  max-width: 640px;
}
.topic-row button {
  background: var(--surface);
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: 0.68rem;
  font-family: 'IBM Plex Mono', monospace;
  cursor: pointer;
  transition: all 0.15s;
  outline: none;
  letter-spacing: 0.04em;
}
.topic-row button:hover { border-color: var(--blue); color: var(--text); }
.topic-row button.active { background: rgba(126,200,227,0.12); color: var(--blue); border-color: var(--blue); }

/* ── Stats strip ── */
.stats {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 4px 20px 8px;
  font-size: 0.7rem;
  color: var(--muted);
}
.stats .pill {
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  background: rgba(255,255,255,0.02);
}

/* ── Card wrapper ── */
.deck-area {
  width: 100%;
  max-width: 620px;
  padding: 0 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 0;
}
.card-wrap { width: 100%; position: relative; }

.card-face {
  width: 100%;
  min-height: 360px;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: linear-gradient(160deg, rgba(255,255,255,0.035) 0%, rgba(255,255,255,0.01) 100%), var(--surface);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  padding: 22px 22px 18px;
  overflow: hidden;
  transition: opacity 0.18s ease;
}
.card-face.flipping { opacity: 0; }

/* Face accent bar */
.face-accent {
  height: 3px;
  border-radius: 2px;
  margin-bottom: 14px;
  flex-shrink: 0;
}
.face-accent-0 { background: linear-gradient(90deg, var(--face0), transparent); }
.face-accent-1 { background: linear-gradient(90deg, var(--face1), transparent); }
.face-accent-2 { background: linear-gradient(90deg, var(--face2), transparent); }
.face-accent-3 { background: linear-gradient(90deg, var(--face3), transparent); }

/* Face label */
.face-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 10px;
  flex-shrink: 0;
}
.face-label-0 { color: var(--face0); }
.face-label-1 { color: var(--face1); }
.face-label-2 { color: var(--face2); }
.face-label-3 { color: var(--face3); }

/* Face bodies */
.face-body { flex: 1; display: flex; flex-direction: column; justify-content: center; }

.term-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  color: var(--white);
  line-height: 1.15;
  margin-bottom: 10px;
}
.hl-badge {
  display: inline-block;
  background: rgba(192,57,43,0.22);
  border: 1px solid rgba(192,57,43,0.5);
  color: #e07070;
  font-size: 0.65rem;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 3px 9px;
  border-radius: 20px;
  margin-left: 6px;
  vertical-align: middle;
}
.topic-badge {
  display: inline-block;
  background: rgba(126,200,227,0.10);
  border: 1px solid rgba(126,200,227,0.3);
  color: var(--blue);
  font-size: 0.6rem;
  font-family: 'IBM Plex Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 3px 9px;
  border-radius: 20px;
  margin-left: 4px;
  vertical-align: middle;
}

/* Face 1: pseudo / symbol */
.symbol-display {
  font-family: 'IBM Plex Mono', 'Courier New', monospace;
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  line-height: 1.65;
  color: var(--white);
  margin-bottom: 14px;
  word-break: break-word;
  background: rgba(126,200,227,0.05);
  border: 1px solid rgba(126,200,227,0.12);
  border-radius: 10px;
  padding: 12px 14px;
}
.no-pseudo {
  color: var(--muted);
  font-style: italic;
  font-size: 0.9rem;
}
.keywords-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-top: 4px;
}
.kw-chip {
  border: 1px solid rgba(126,200,227,0.3);
  color: var(--blue);
  font-size: 0.72rem;
  padding: 4px 11px;
  border-radius: 20px;
  background: rgba(126,200,227,0.06);
}

/* Face 2: context quote */
.context-quote {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.1rem, 3vw, 1.45rem);
  font-style: italic;
  color: var(--white);
  line-height: 1.65;
}

/* Face 3: full definition */
.full-text {
  font-size: 0.91rem;
  line-height: 1.8;
  color: var(--text);
}
.see-also {
  margin-top: 12px;
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.see-also span { color: var(--blue); opacity: 0.8; }

/* Face footer */
.face-footer {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
  min-height: 30px;
}
.footer-text { font-size: 0.72rem; color: var(--muted); }
.footer-text .dim { opacity: 0.6; margin-right: 4px; }

/* Face dots */
.face-dots {
  display: flex;
  gap: 7px;
  justify-content: center;
  padding: 12px 0 4px;
}
.face-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border2);
  transition: background 0.2s, transform 0.2s;
}
.face-dot.active { transform: scale(1.35); }
.face-dot-0.active { background: var(--face0); }
.face-dot-1.active { background: var(--face1); }
.face-dot-2.active { background: var(--face2); }
.face-dot-3.active { background: var(--face3); }

/* Navigation */
.nav {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  padding: 10px 20px 6px;
  flex-wrap: wrap;
}
.nav button {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 9px 22px;
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.12s;
  min-width: 100px;
}
.nav button:hover { border-color: var(--blue); transform: translateY(-1px); }
.nav .idx-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--blue);
  min-width: 70px;
  text-align: center;
}
.flip-btn { border-color: rgba(126,200,227,0.4) !important; }

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 620px;
  padding: 8px 16px 20px;
}
.progress-track {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), #a8dff0);
  border-radius: 4px;
  transition: width 0.3s ease;
}

/* Swipe hint */
.swipe-hint {
  text-align: center;
  color: var(--muted);
  font-size: 0.68rem;
  padding: 0 20px 16px;
  letter-spacing: 0.04em;
}

/* Footer stamp */
.footer-stamp {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.58rem;
  color: var(--border2);
  text-align: center;
  padding: 0 20px 20px;
  letter-spacing: 0.08em;
}

/* Empty state */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.9rem;
}

@media (max-width: 480px) {
  .card-face { padding: 18px 16px 14px; }
  .term-name { font-size: clamp(1.4rem, 7vw, 2.2rem); }
}
</style>
</head>
<body>

<div class="header">
  <h1>IB Computer Science</h1>
  <div class="sub">Swipe Flashcards &nbsp;·&nbsp; Four-face tap-to-reveal</div>
</div>

<div class="controls">
  <button id="btn-all" class="active" onclick="setFilter('all')">All</button>
  <button id="btn-sl" onclick="setFilter('sl')">SL</button>
  <button id="btn-hl" onclick="setFilter('hl')">HL only</button>
  <button onclick="shuffleDeck()">Shuffle</button>
  <input id="search" type="text" placeholder="Search terms…" oninput="onSearch()" />
</div>

<div class="topic-row" id="topicRow"></div>

<div class="stats">
  <div class="pill" id="stat-count"></div>
  <div class="pill">Tap card → next face</div>
  <div class="pill">Swipe left/right → navigate</div>
</div>

<div class="deck-area">
  <div class="card-wrap">
    <div class="card-face" id="cardFace">
      <div class="empty-state">Loading…</div>
    </div>
    <div class="face-dots" id="faceDots">
      <div class="face-dot face-dot-0 active"></div>
      <div class="face-dot face-dot-1"></div>
      <div class="face-dot face-dot-2"></div>
      <div class="face-dot face-dot-3"></div>
    </div>
  </div>
</div>

<div class="nav">
  <button onclick="navigate(-1)">← Prev</button>
  <div class="idx-label" id="idxLabel">—</div>
  <button class="flip-btn" onclick="flipCard()">Flip ↻</button>
  <button onclick="navigate(1)">Next →</button>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="swipe-hint">Arrow keys ← → navigate &nbsp;·&nbsp; Space or ↓ flips</div>
<div class="footer-stamp">Constructed by Silicon · Anthropic Claude — Architect Carbon · LeeMcCullochJames</div>

<script>
// ── TOPIC COLOURS for chips ──
const TOPIC_COLOR = {
  'Systems & Architecture': '#c8a96e',
  'Networks':               '#7ec8e3',
  'OOP':                    '#b08fd4',
  'Algorithms':             '#9bd29b',
  'Data Structures':        '#d8b06a',
  'Databases':              '#e07a7a',
  'Control Systems':        '#7ec8e3',
  'Software Dev':           '#c8a96e',
  'Abstract Data Types':    '#b08fd4',
  'Theory':                 '#9bd29b',
};

// ── TERMS ──
const TERMS = [
  // ── Systems & Architecture ──
  { term:"Abstraction", hl:false, topic:"Systems & Architecture",
    pseudo:"// Hiding implementation detail\ninterface Shape {\n  area(): number\n}",
    keywords:["hiding complexity","interface","information hiding","modular design"],
    synonyms:["information hiding","encapsulation of complexity"],
    antonyms:["concrete implementation"],
    context:"When you call sort() on a list, you abstract away the algorithm details — you state what you want, not how to achieve it.",
    full:"Focusing on essential properties while ignoring irrelevant complexity. A core principle of computer science that allows systems to be built in layers, each hiding detail from the one above.",
    seealso:["Encapsulation","Interface","Module"]},

  { term:"CPU (Central Processing Unit)", hl:false, topic:"Systems & Architecture",
    pseudo:"FETCH → DECODE → EXECUTE → (STORE)\n\nRegisters: ACC, PC, MAR, MDR\nComponents: ALU + CU + Registers",
    keywords:["fetch-decode-execute","ALU","control unit","registers"],
    synonyms:["processor","microprocessor"],
    antonyms:["memory","peripheral"],
    context:"Every instruction your program runs is fetched from memory by the PC, decoded by the CU, and executed by the ALU — millions of times per second.",
    full:"The main processing unit containing the Arithmetic Logic Unit (ALU), Control Unit (CU), and registers. Executes the machine instruction cycle: Fetch → Decode → Execute → (Store).",
    seealso:["ALU","Register","Machine Instruction Cycle","Cache Memory"]},

  { term:"ALU (Arithmetic Logic Unit)", hl:false, topic:"Systems & Architecture",
    pseudo:"// Performs:\n// Arithmetic: +, -, *, /\n// Logic: AND, OR, NOT, XOR\n// Comparison: <, >, ==",
    keywords:["arithmetic","logical operations","comparison","addition"],
    synonyms:["arithmetic unit"],
    antonyms:["control unit"],
    context:"When you write a + b in code, the ALU is the physical circuit that adds those two binary numbers together.",
    full:"The component of the CPU that performs all arithmetic and logical operations on data. Results typically stored in the accumulator register.",
    seealso:["CPU","Register","Binary"]},

  { term:"Register", hl:false, topic:"Systems & Architecture",
    pseudo:"PC  — Program Counter (next instruction address)\nMAR — Memory Address Register\nMDR — Memory Data Register\nACC — Accumulator (current result)",
    keywords:["fast storage","PC","MAR","MDR","accumulator"],
    synonyms:["CPU register"],
    antonyms:["RAM","hard disk"],
    context:"Registers are the fastest storage in the system — but there are very few of them. The PC always holds the address of the next instruction to fetch.",
    full:"Small, extremely fast memory locations within the CPU. Key registers include the Program Counter (PC), Memory Address Register (MAR), Memory Data Register (MDR), and Accumulator (ACC).",
    seealso:["CPU","MAR","MDR","Cache Memory"]},

  { term:"Cache Memory", hl:false, topic:"Systems & Architecture",
    pseudo:"Access time hierarchy:\nRegisters: ~1 ns\nL1 Cache:  ~2 ns\nL2 Cache:  ~10 ns\nRAM:       ~100 ns\nSSD:       ~100 µs",
    keywords:["fast access","frequently used","L1 L2 L3","hierarchy"],
    synonyms:["CPU cache"],
    antonyms:["main memory","secondary storage"],
    context:"The CPU checks cache before RAM. A cache hit avoids the slower RAM access; a cache miss forces a slower fetch from RAM.",
    full:"High-speed memory located close to or within the CPU that stores frequently accessed data and instructions to reduce average memory access time.",
    seealso:["RAM","Register","Virtual Memory"]},

  { term:"RAM (Random Access Memory)", hl:false, topic:"Systems & Architecture",
    pseudo:"// Volatile — loses contents on power-off\n// Used for: running programs, open data\n// Addressable: each byte has a unique address",
    keywords:["volatile","temporary","addressable","working memory"],
    synonyms:["main memory","primary memory"],
    antonyms:["ROM","secondary storage"],
    context:"When you open a program, it loads from the hard disk into RAM. Close the program and power off — RAM forgets everything.",
    full:"Volatile primary memory used to store currently running programs and their data. Each byte is directly addressable. Lost on power-off.",
    seealso:["ROM","Cache Memory","Virtual Memory","Paging"]},

  { term:"ROM (Read Only Memory)", hl:false, topic:"Systems & Architecture",
    pseudo:"// Non-volatile — retains data without power\n// Typical content: BIOS/UEFI firmware\n// Cannot (easily) be rewritten",
    keywords:["non-volatile","firmware","BIOS","permanent"],
    synonyms:["read-only memory"],
    antonyms:["RAM","volatile memory"],
    context:"When you press the power button, the CPU runs the BIOS stored in ROM before any operating system loads.",
    full:"Non-volatile memory that retains its contents when power is removed. Stores firmware such as the BIOS/UEFI that bootstraps the computer.",
    seealso:["RAM","Firmware","Non-volatile Memory"]},

  { term:"Virtual Memory", hl:false, topic:"Systems & Architecture",
    pseudo:"// OS uses disk space as extra RAM\n// Pages swapped in/out as needed\n\nIf RAM full:\n  move inactive page → swap space (disk)\n  load required page → RAM",
    keywords:["disk as RAM","paging","swap","extends RAM"],
    synonyms:["swap memory"],
    antonyms:["physical memory","real RAM"],
    context:"If you have 16 GB RAM and open programs needing 20 GB, the OS silently pages the least-used blocks to disk — performance drops but the system keeps running.",
    full:"A memory management technique where the OS uses secondary storage (disk) to extend apparent RAM capacity. Inactive memory pages are swapped to disk and recalled on demand.",
    seealso:["RAM","Paging","Disk Thrashing","Memory Management"]},

  { term:"Paging", hl:false, topic:"Systems & Architecture",
    pseudo:"// Memory divided into fixed-size PAGES\n// Page table maps virtual → physical address\n\nPage size: typically 4 KB\nPage table entry: virtual_page → frame_no",
    keywords:["fixed-size blocks","page table","virtual address","frame"],
    synonyms:["memory paging"],
    antonyms:["segmentation","contiguous allocation"],
    context:"Paging lets the OS place different parts of a program anywhere in physical memory, using a page table to track where each piece lives.",
    full:"A memory management scheme that divides both virtual and physical memory into fixed-size blocks (pages/frames). A page table maps virtual page numbers to physical frame numbers.",
    seealso:["Virtual Memory","Segmentation","Memory Management","Disk Thrashing"]},

  { term:"Binary", hl:false, topic:"Systems & Architecture",
    pseudo:"Base 2: digits 0 and 1\n\n1010₂ = 1×8 + 0×4 + 1×2 + 0×1 = 10₁₀\n\nConvert 13₁₀ → binary:\n13 ÷ 2 = 6 r1\n 6 ÷ 2 = 3 r0\n 3 ÷ 2 = 1 r1\n 1 ÷ 2 = 0 r1  → 1101₂",
    keywords:["base 2","bits","0 and 1","place value"],
    synonyms:["base-2","binary notation"],
    antonyms:["decimal","hexadecimal"],
    context:"All data inside a computer is ultimately stored and processed as binary — sequences of 0s and 1s representing off and on states in transistors.",
    full:"The base-2 number system using only digits 0 and 1. All computer data is ultimately represented in binary, with each digit called a bit.",
    seealso:["Hexadecimal","Bit","Byte","Logic Gate"]},

  { term:"Hexadecimal", hl:false, topic:"Systems & Architecture",
    pseudo:"Base 16: 0-9 then A-F\n\nFF₁₆ = 15×16 + 15 = 255₁₀\nAB₁₆ = 10×16 + 11 = 171₁₀\n\nColors: #FF5722 → R=255, G=87, B=34",
    keywords:["base 16","A-F","compact binary","color codes"],
    synonyms:["hex","base-16"],
    antonyms:["binary","decimal"],
    context:"Memory addresses and color values use hex because two hex digits represent exactly one byte — far more compact than eight binary digits.",
    full:"The base-16 number system using digits 0–9 and letters A–F. Widely used in computing to represent binary data compactly (each hex digit = 4 bits).",
    seealso:["Binary","Bit","Byte","RGB Color Model"]},

  { term:"Logic Gate", hl:false, topic:"Systems & Architecture",
    pseudo:"AND:  1 AND 1 = 1  else 0\nOR:   0 OR  0 = 0  else 1\nNOT:  NOT 1 = 0\nXOR:  same→0, different→1\nNAND: NOT(AND)\nNOR:  NOT(OR)",
    keywords:["AND OR NOT XOR NAND NOR","boolean","circuit","transistors"],
    synonyms:["boolean gate"],
    antonyms:["analogue circuit"],
    context:"NAND gates are universal — any logic function, and therefore any computation, can be built from NAND gates alone.",
    full:"An electronic circuit implementing a Boolean operation on one or more binary inputs to produce a single binary output. The fundamental building blocks of all digital circuits.",
    seealso:["Boolean Operators","Truth Table","Transistor","Half Adder"]},

  { term:"Truth Table", hl:false, topic:"Systems & Architecture",
    pseudo:"A | B | A AND B | A OR B | NOT A\n--+---+---------+--------+------\n0 | 0 |    0    |   0    |   1\n0 | 1 |    0    |   1    |   1\n1 | 0 |    0    |   1    |   0\n1 | 1 |    1    |   1    |   0",
    keywords:["all input combinations","boolean output","verification"],
    synonyms:["boolean table"],
    antonyms:["Karnaugh map"],
    context:"To verify a logic circuit is correct, enumerate all possible input combinations in a truth table and check each output matches specification.",
    full:"A table showing every possible combination of binary inputs to a logic expression or gate, with the corresponding output for each combination.",
    seealso:["Logic Gate","Boolean Operators","Half Adder"]},

  { term:"Half Adder", hl:true, topic:"Systems & Architecture",
    pseudo:"Inputs: A, B\nOutputs: Sum (S), Carry (C)\n\nS = A XOR B\nC = A AND B\n\nA=1, B=1 → S=0, C=1 (carries into next bit)",
    keywords:["XOR AND","sum carry","binary addition","circuit"],
    synonyms:["1-bit adder"],
    antonyms:["full adder"],
    context:"A half adder adds two single bits and produces a sum and carry. Two half adders make a full adder, which can handle a carry-in from a previous bit.",
    full:"A logic circuit that adds two binary digits, producing a Sum (= A XOR B) and a Carry (= A AND B). Cannot handle a carry-in from a previous stage.",

// Unique topics for filter buttons
const ALL_TOPICS = [...new Set(TERMS.map(t => t.topic))];

// ── App state ──
let deck = [];
let idx = 0;
let face = 0;
let filterHL = 'all';
let filterTopic = 'all';
let search = '';
let isAnimating = false;

// ── Helpers ──
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Build topic buttons ──
function buildTopicButtons() {
  const row = document.getElementById('topicRow');
  const allBtn = document.createElement('button');
  allBtn.textContent = 'All topics';
  allBtn.className = 'active';
  allBtn.onclick = () => setTopic('all');
  allBtn.id = 'tbtn-all';
  row.appendChild(allBtn);

  ALL_TOPICS.forEach(tp => {
    const btn = document.createElement('button');
    btn.textContent = tp;
    btn.id = 'tbtn-' + tp;
    btn.onclick = () => setTopic(tp);
    row.appendChild(btn);
  });
}

// ── Deck management ──
function buildDeck() {
  const s = search.toLowerCase().trim();
  deck = TERMS.filter(t => {
    const matchHL =
      filterHL === 'all' ? true :
      filterHL === 'sl'  ? !t.hl :
                            t.hl;
    const matchTopic = filterTopic === 'all' || t.topic === filterTopic;
    if (!matchHL || !matchTopic) return false;
    if (!s) return true;
    return (
      t.term.toLowerCase().includes(s) ||
      (t.keywords||[]).some(k => k.toLowerCase().includes(s)) ||
      (t.synonyms||[]).some(k => k.toLowerCase().includes(s)) ||
      t.topic.toLowerCase().includes(s)
    );
  });
  idx = 0; face = 0;
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  idx = 0; face = 0;
  render();
}

// ── Face renderers ──
function renderFace(card, f) {
  const faceLabels = ['Term','Pseudocode · Keywords','Context','Full Definition'];
  const accent = `<div class="face-accent face-accent-${f}"></div>`;
  const label  = `<div class="face-label face-label-${f}">${faceLabels[f]}</div>`;

  // Topic color
  const tc = TOPIC_COLOR[card.topic] || '#7ec8e3';

  let body = '', footer = '';

  if (f === 0) {
    const hlBadge = card.hl ? '<span class="hl-badge">HL</span>' : '';
    const topicBadge = `<span class="topic-badge">${escHtml(card.topic)}</span>`;
    body = `<div class="face-body" style="justify-content:center;">
      <div class="term-name">${escHtml(card.term)}${hlBadge}${topicBadge}</div>
    </div>`;
    footer = `<div class="face-footer">
      <span></span>
      <span class="footer-text">Tap → see pseudocode</span>
    </div>`;

  } else if (f === 1) {
    const hasPseudo = card.pseudo && card.pseudo.trim();
    const pseudoHtml = hasPseudo
      ? `<div class="symbol-display">${escHtml(card.pseudo)}</div>`
      : `<div class="symbol-display no-pseudo">no pseudocode for this term</div>`;
    const kwHtml = (card.keywords||[]).map(k =>
      `<span class="kw-chip">${escHtml(k)}</span>`).join('');
    body = `<div class="face-body">
      ${pseudoHtml}
      <div class="keywords-row">${kwHtml}</div>
    </div>`;
    const synStr = (card.synonyms||[]).filter(s=>s).join(' · ');
    footer = `<div class="face-footer">
      ${synStr ? `<span class="footer-text"><span class="dim">Syn:</span>${escHtml(synStr)}</span>` : '<span></span>'}
      <span class="footer-text">Tap → context</span>
    </div>`;

  } else if (f === 2) {
    body = `<div class="face-body" style="justify-content:center;">
      <div class="context-quote">"${escHtml(card.context || '')}"</div>
    </div>`;
    const antStr = (card.antonyms||[]).filter(s=>s).join(' · ');
    footer = `<div class="face-footer">
      ${antStr ? `<span class="footer-text"><span class="dim">Contrast:</span>${escHtml(antStr)}</span>` : '<span></span>'}
      <span class="footer-text">Tap → definition</span>
    </div>`;

  } else {
    const saHtml = card.seealso && card.seealso.length
      ? `<div class="see-also">See also: <span>${card.seealso.map(escHtml).join(' · ')}</span></div>`
      : '';
    body = `<div class="face-body" style="justify-content:flex-start;padding-top:4px;">
      <div class="full-text">${escHtml(card.full || '')}</div>
      ${saHtml}
    </div>`;
    footer = `<div class="face-footer">
      <span></span>
      <span class="footer-text">Tap → back to term</span>
    </div>`;
  }

  return accent + label + body + footer;
}

// ── Render ──
function render() {
  const countEl = document.getElementById('stat-count');
  const cardEl  = document.getElementById('cardFace');
  const dotsEl  = document.getElementById('faceDots');
  const idxEl   = document.getElementById('idxLabel');
  const progEl  = document.getElementById('progressFill');

  countEl.textContent = deck.length + (deck.length === 1 ? ' term' : ' terms');

  if (deck.length === 0) {
    cardEl.innerHTML = '<div class="empty-state">No matching terms.</div>';
    dotsEl.querySelectorAll('.face-dot').forEach(d => d.classList.remove('active'));
    idxEl.textContent = '—';
    progEl.style.width = '0%';
    return;
  }

  const card = deck[idx];
  cardEl.innerHTML = renderFace(card, face);
  dotsEl.querySelectorAll('.face-dot').forEach((d, i) => d.classList.toggle('active', i === face));
  idxEl.textContent = `${idx + 1} / ${deck.length}`;
  progEl.style.width = ((idx + 1) / deck.length * 100).toFixed(1) + '%';
}

// ── Actions ──
function flipCard() {
  if (isAnimating || deck.length === 0) return;
  isAnimating = true;
  const cardEl = document.getElementById('cardFace');
  cardEl.classList.add('flipping');
  setTimeout(() => {
    face = (face + 1) % 4;
    render();
    cardEl.classList.remove('flipping');
    isAnimating = false;
  }, 180);
}

function navigate(dir) {
  if (isAnimating || deck.length === 0) return;
  isAnimating = true;
  const cardEl = document.getElementById('cardFace');
  cardEl.style.transition = 'opacity 0.15s, transform 0.15s';
  cardEl.style.opacity = '0';
  cardEl.style.transform = dir > 0 ? 'translateX(-30px)' : 'translateX(30px)';
  setTimeout(() => {
    idx = (idx + dir + deck.length) % deck.length;
    face = 0;
    cardEl.style.transition = 'none';
    cardEl.style.transform = dir > 0 ? 'translateX(30px)' : 'translateX(-30px)';
    cardEl.style.opacity = '0';
    render();
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        cardEl.style.transition = 'opacity 0.2s, transform 0.2s';
        cardEl.style.opacity = '1';
        cardEl.style.transform = 'translateX(0)';
        setTimeout(() => { cardEl.style.transition = ''; cardEl.style.transform = ''; isAnimating = false; }, 210);
      });
    });
  }, 150);
}

// ── Touch / Pointer ──
let touchStartX = 0, touchStartY = 0, touchStartT = 0;
document.getElementById('cardFace').addEventListener('touchstart', e => {
  const t = e.changedTouches[0];
  touchStartX = t.clientX; touchStartY = t.clientY; touchStartT = Date.now();
}, { passive: true });
document.getElementById('cardFace').addEventListener('touchend', e => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 1.5) navigate(dx < 0 ? 1 : -1);
  else if (Math.abs(dx) < 15 && Math.abs(dy) < 15 && Date.now() - touchStartT < 300) flipCard();
}, { passive: true });

let pX = 0, pY = 0, pDown = false;
document.getElementById('cardFace').addEventListener('pointerdown', e => { pX = e.clientX; pY = e.clientY; pDown = true; });
document.getElementById('cardFace').addEventListener('pointerup', e => {
  if (!pDown) return; pDown = false;
  const dx = e.clientX - pX, dy = e.clientY - pY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) navigate(dx < 0 ? 1 : -1);
  else if (Math.abs(dx) < 8 && Math.abs(dy) < 8) flipCard();
});
document.getElementById('cardFace').addEventListener('pointerleave', () => { pDown = false; });

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); flipCard(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); face = 0; render(); }
});

// ── Filters ──
function setFilter(f) {
  filterHL = f;
  ['all','sl','hl'].forEach(id => {
    const btn = document.getElementById('btn-' + id);
    if (!btn) return;
    btn.className = '';
    if (id === f) btn.className = id === 'hl' ? 'hl-active' : 'active';
  });
  buildDeck(); render();
}

function setTopic(tp) {
  filterTopic = tp;
  document.querySelectorAll('.topic-row button').forEach(b => b.classList.remove('active'));
  const tgt = document.getElementById('tbtn-' + tp);
  if (tgt) tgt.classList.add('active');
  buildDeck(); render();
}

function onSearch() {
  search = document.getElementById('search').value;
  buildDeck(); render();
}

// ── Init ──
buildTopicButtons();
buildDeck();
render();
</script>
