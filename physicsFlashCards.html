  {
    term: "Terminal Velocity",
    symbol: "v_t",
    unit: "m s⁻¹",
    hl: false,
    keywords: ["drag force", "weight", "zero acceleration", "equilibrium"],
    synonyms: ["settling velocity"],
    antonyms: ["free fall in vacuum"],
    context: "A falling object reaches terminal velocity when drag exactly balances weight so the net force becomes zero.",
    full: "The constant speed reached by a falling object when resistive forces balance its weight, preventing further acceleration."
  },
  {
    term: "Time Constant",
    symbol: "τ",
    unit: "s",
    hl: true,
    keywords: ["RC circuit", "exponential decay", "discharge rate"],
    synonyms: ["relaxation time"],
    antonyms: [],
    context: "In an RC circuit, the time constant sets how quickly charge and current rise or fall exponentially.",
    full: "The characteristic time for current, charge, or voltage in an RC circuit to change by a factor of e."
  },
  {
    term: "Time Dilation",
    symbol: "Δt = γΔt₀",
    unit: "s",
    hl: true,
    keywords: ["moving clocks run slow", "proper time", "gamma"],
    synonyms: ["relativistic dilation"],
    antonyms: ["proper time"],
    context: "A fast-moving clock is measured by a stationary observer to tick more slowly than a clock at rest in that observer's frame.",
    full: "A relativistic effect in which the time interval between events is measured to be longer in a frame where the clock is moving."
  },
  {
    term: "Torque",
    symbol: "τ",
    unit: "N m",
    hl: true,
    keywords: ["turning effect", "τ = Fr sinθ", "rotational force"],
    synonyms: ["moment"],
    antonyms: ["equilibrium"],
    context: "Using a longer wrench increases the turning effect for the same applied force.",
    full: "The turning effect of a force about a pivot or axis, given by the vector product τ = r × F."
  },
  {
    term: "Wave–Particle Duality",
    symbol: "—",
    unit: "—",
    hl: true,
    keywords: ["photon and wave", "electron diffraction", "complementarity"],
    synonyms: ["duality"],
    antonyms: ["classical particle"],
    context: "Electrons behave like particles in some experiments and like waves in others.",
    full: "The principle that matter and radiation display both wave-like and particle-like properties depending on the experiment."
  },
  {
    term: "Wavelength",
    symbol: "λ",
    unit: "m",
    hl: false,
    keywords: ["peak to peak", "spatial cycle", "wave speed"],
    synonyms: ["cycle length"],
    antonyms: ["wave number"],
    context: "Wavelength is the distance between adjacent points in phase, such as crest to crest.",
    full: "The distance between successive points in phase on a wave. It is related to wave speed and frequency by v = fλ."
  },
  {
    term: "White Dwarf",
    symbol: "—",
    unit: "dimensionless",
    hl: false,
    keywords: ["electron degeneracy", "low mass remnant", "planetary nebula"],
    synonyms: ["degenerate dwarf"],
    antonyms: ["neutron star", "red giant"],
    context: "After a Sun-like star sheds its outer layers, its hot dense core remains as a white dwarf.",
    full: "The compact remnant of a low- or intermediate-mass star, supported against collapse by electron degeneracy pressure."
  },
  {
    term: "Work",
    symbol: "W",
    unit: "J",
    hl: false,
    keywords: ["force × displacement", "energy transfer", "scalar"],
    synonyms: ["energy transferred", "mechanical work"],
    antonyms: ["no work", "static force"],
    context: "Work is done when a force causes displacement in its direction; carrying a bag horizontally does no work against gravity.",
    full: "The energy transferred when a force acts through a displacement. For a constant force, W = Fs cosθ."
  },
  {
    term: "Work Function",
    symbol: "Φ",
    unit: "J or eV",
    hl: true,
    keywords: ["minimum energy to eject electron", "threshold", "photoelectric effect", "threshold frequency"],
    synonyms: ["extraction energy", "threshold energy"],
    antonyms: ["max kinetic energy", "electron affinity"],
    context: "Each metal has its own work function, which is the minimum photon energy needed to liberate an electron from its surface.",
    full: "The minimum energy required to remove an electron from the surface of a metal. In the photoelectric effect it determines the threshold frequency through f₀ = Φ/h."
  }
];

        // Always keep glossary alphabetized in the UI
        TERMS.sort((a, b) => a.term.localeCompare(b.term));

        const LEVEL_LABELS = ["Keywords · Synonyms · Antonyms", "Context sentence", "Full explanation"];
        const LEVEL_COLORS = [GOLD, "#7ec8e3", "#a8d5a2"];

        function App() {
            const [filter, setFilter] = useState("all");
            const [search, setSearch] = useState("");
            const [idx, setIdx] = useState(0);
            const [level, setLevel] = useState(0);
            const [transitioning, setTransitioning] = useState(false);

            const filtered = TERMS.filter(t => {
                const matchFilter = filter === "all" || (filter === "hl" ? t.hl : !t.hl);
                const s = search.toLowerCase();
                return matchFilter && (!s || (t.term || '').toLowerCase().includes(s) || (t.keywords || []).some(k => k.toLowerCase().includes(s)));
            });

            const card = filtered[idx] || null;

            const go = useCallback((dir) => {
                if (transitioning || filtered.length === 0) return;
                setTransitioning(true);
                setTimeout(() => {
                    setIdx(i => (i + dir + filtered.length) % filtered.length);
                    setLevel(0);
                    setTransitioning(false);
                }, 180);
            }, [transitioning, filtered.length]);

            useEffect(() => {
                const h = (e) => {
                    if (e.key === "ArrowRight") go(1);
                    if (e.key === "ArrowLeft") go(-1);
                    if (e.key === "ArrowDown" && level < 2) setLevel(l => l + 1);
                    if (e.key === "ArrowUp" && level > 0) setLevel(l => l - 1);
                };
                window.addEventListener("keydown", h);
                return () => window.removeEventListener("keydown", h);
            }, [go, level]);

            useEffect(() => { setIdx(0); setLevel(0); }, [filter, search]);

            return (
                <div style={{minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:24}}>
                    <div style={{textAlign:"center", marginBottom:30}}>
                        <div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:"2rem", color:GOLD}}>IB Physics Glossary</div>
                        <div style={{fontFamily:"'IBM Plex Mono', monospace", fontSize:"0.7rem", color:MUTED, textTransform:"uppercase"}}>Three-Level Flashcards · {filtered.length} Terms</div>
                    </div>

                    <div style={{display:"flex", gap:10, marginBottom:20, flexWrap:"wrap", justifyContent:"center"}}>
                        {["all","sl","hl"].map(f => (
                            <button key={f} onClick={() => setFilter(f)} style={{
                                background: filter === f ? (f === "hl" ? HL_RED : GOLD) : SURFACE,
                                color: filter === f ? BG : MUTED,
                                border: "1px solid #1e2028", borderRadius:20, padding:"6px 16px", cursor:"pointer", textTransform:"uppercase", fontSize:"0.7rem"
                            }}>{f}</button>
                        ))}
                        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search..." style={{background:SURFACE, border:`1px solid ${BORDER}`, color:TEXT, borderRadius:20, padding:"6px 14px", fontSize:"0.75rem", outline:"none", width:120}} />
                    </div>

                    {card ? (
                        <div style={{width:"100%", maxWidth:600, opacity: transitioning ? 0 : 1, transition:"opacity 0.2s"}}>
                            <div style={{background:SURFACE, border:`1px solid ${card.hl ? HL_RED : BORDER}`, borderRadius:16, overflow:"hidden"}}>
                                <div style={{background: card.hl ? `${HL_RED}15` : "#0f1016", padding:24, textAlign:"center", borderBottom:`1px solid ${BORDER}`}}>
                                    <div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:"2.2rem", color:WHITE}}>{card.term} {card.hl && <span style={{fontSize:"0.7rem", background:HL_RED, color:WHITE, padding:"2px 6px", borderRadius:4, verticalAlign:"middle"}}>HL</span>}</div>
                                    {card.symbol && <div style={{color:GOLD, fontStyle:"italic", marginTop:4}}>{card.symbol}{card.unit ? ` [${card.unit}]` : ''}</div>}
                                </div>
                                <div style={{display:"flex", borderBottom:`1px solid ${BORDER}`}}>
                                    {[1,2,3].map((n, i) => (
                                        <button key={n} onClick={() => setLevel(i)} style={{flex:1, padding:12, background: level === i ? `${LEVEL_COLORS[i]}20` : "transparent", color: level === i ? LEVEL_COLORS[i] : MUTED, border:"none", borderBottom: level === i ? `2px solid ${LEVEL_COLORS[i]}` : "2px solid transparent", cursor:"pointer", fontSize:"0.65rem", textTransform:"uppercase"}}>Level {n}</button>
                                    ))}
                                </div>
                                <div style={{padding:30, minHeight:160, display:"flex", alignItems:"center", justifyContent:"center", textAlign:"center"}}>
                                    {level === 0 && (
                                        <div>
                                            <div style={{display:"flex", flexWrap:"wrap", gap:8, justifyContent:"center", marginBottom:20}}>{(card.keywords || []).map(k => <span key={k} style={{border:`1px solid ${GOLD}50`, color:GOLD, padding:"3px 10px", borderRadius:15, fontSize:"0.75rem"}}>{k}</span>)}</div>
                                            <div style={{display:"flex", gap:15, justifyContent:"center"}}><div style={{fontSize:"0.8rem"}}><span style={{color:MUTED}}>Syn:</span> {(card.synonyms || []).join(", ")}</div><div style={{fontSize:"0.8rem"}}><span style={{color:MUTED}}>Ant:</span> {(card.antonyms || []).join(", ")}</div></div>
                                        </div>
                                    )}
                                    {level === 1 && <div style={{fontFamily:"'Cormorant Garamond', serif", fontSize:"1.4rem", fontStyle:"italic", color:WHITE}}>"{card.context}"</div>}
                                    {level === 2 && <div style={{fontSize:"0.95rem", lineHeight:1.7, textAlign:"left"}}>{card.full}</div>}
                                </div>
                                <div style={{padding:15, background:"#0f1016", borderTop:`1px solid ${BORDER}`, display:"flex", justifyContent:"space-between"}}>
                                    <button onClick={() => go(-1)} style={{background:"none", border:"none", color:MUTED, cursor:"pointer"}}>← Prev</button>
                                    <div style={{color:GOLD, fontSize:"0.8rem"}}>{idx + 1} / {filtered.length}</div>
                                    <button onClick={() => go(1)} style={{background:"none", border:"none", color:MUTED, cursor:"pointer"}}>Next →</button>
                                </div>
                            </div>
                        </div>
                    ) : <div style={{color:MUTED}}>No results.</div>}
                    
                    <div style={{marginTop:40, color:MUTED, fontSize:"0.6rem", letterSpacing:"0.1em", textTransform:"uppercase"}}>Constructed by Silicon · Architect Carbon · LeeMcCullochJames</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
